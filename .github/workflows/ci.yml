name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Catch lint errors
      - run: npm run lint

      # Verify the production bundle compiles cleanly (catches broken imports, etc.)
      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:3000' }}

  build-and-push:
    name: Build & Push
    needs: test
    # Only push images on direct pushes to main, not on PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    env:
      IMAGE: ${{ vars.GAR_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/product-ui

    steps:
      - uses: actions/checkout@v4

      # Keyless auth via Workload Identity Federation — no long-lived credentials stored
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3

      # Generate tags: latest + sha-<short> (e.g. sha-a1b2c3d)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GAR_REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # VITE_API_URL is baked into the JS bundle at build time
          build-args: VITE_API_URL=${{ vars.VITE_API_URL }}
          # Layer cache stored in GitHub Actions cache — speeds up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
